services:
  redis:
    image: docker.io/library/redis:latest
    container_name: redis_server
    ports:
      - "6379:6379"
    restart: unless-stopped

  chat-server:
    image: node:20
    container_name: chat_server
    working_dir: /app
    command: yarn run start
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      REDIS_HOST: redis      # same Redis for both services
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    restart: unless-stopped
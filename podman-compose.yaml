services:
  redis:
    image: docker.io/library/redis:8.6.1-trixie
    container_name: redis
    command: redis-server --port ${REDIS_PORT} # Needed if REDIS_PORT is changed from 6379 in .env
    ports: # Bind Redis to localhost only so it's accessible from the host machine
      # for debugging, but not exposed to the public network. Both host and 
      # container use the same port number (from .env). Other containers
      # communicate via the internal Compose network using the service name.
      - 127.0.0.1:${REDIS_PORT}:${REDIS_PORT}
    restart: unless-stopped

  concord:
    image: docker.io/library/node:24.14.0-trixie-slim
    container_name: concord
    working_dir: /app
    command: node runtime.js
    depends_on:
      - redis
    env_file:
      - .env
    ports:
      - ${API_PORT}:${API_PORT}
    volumes:
      # Container only
      - node_modules:/app/node_modules # This one is also shared for development (TypeScript static checker needs them)
      # - dist:/app/dist # TODO: build fails if this is container only; maybe needs to be added to `volumes:`
      # Share with host for live Nodemon updates
      - ./.env:/app/.env:Z
      - ./nodemon.json:/app/nodemon.json:Z
      - ./package.json:/app/package.json:Z
      - ./runtime.js:/app/runtime.js:Z
      - ./tsconfig.json:/app/tsconfig.json:Z
      - ./src:/app/src:Z
      - ./data:/app/data:Z
    restart: unless-stopped
    
volumes:
  node_modules: {}

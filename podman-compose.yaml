services:
  redis:
    image: docker.io/library/redis:8.6.1-alpine
    container_name: redis
    command: redis-server --loglevel warning --protected-mode no
    restart: unless-stopped

  concord:
    image: docker.io/library/node:24.14.0-alpine
    container_name: concord
    working_dir: /app
    command: node bootstrap.js
    environment:
      - IS_CONTAINER=true
      - API_PORT=8080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    expose:
      - "8080"  # Internal port for Caddy proxy (not exposed to host)
    depends_on:
      - redis
    volumes:
      # Bind mounts (you edit on host + Zero Install with container install support)
      - ./.pnp.cjs:/app/.pnp.cjs:Z
      - ./.pnp.loader.mjs:/app/.pnp.loader.mjs:Z
      - ./.yarn:/app/.yarn:Z
      - ./.yarnrc.yml:/app/.yarnrc.yml:ro,Z
      - ./yarn.lock:/app/yarn.lock:Z
      - ./data:/app/data:Z
      - ./src:/app/src:Z
      - ./bootstrap.js:/app/bootstrap.js:Z
      - ./nodemon.json:/app/nodemon.json:Z
      - ./package.json:/app/package.json:Z
      - ./podman-compose.yaml:/app/podman-compose.yaml:Z
      - ./tsconfig.json:/app/tsconfig.json:Z
    restart: unless-stopped

  caddy:
    image: docker.io/library/caddy:2.11.2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    depends_on:
      - concord 
    
volumes:
  caddy-data: {}
  caddy-config: {}

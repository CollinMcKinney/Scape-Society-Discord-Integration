services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: postgres
    command: ["postgres", "-c", "log_min_messages=warning", "-c", "log_statement=none", "-c", "max_connections=1", "-c", "superuser_reserved_connections=0"]
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-concord}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-concord_secret_password_change_in_production}
      - POSTGRES_DB=concord
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - concord_net

  redis:
    image: docker.io/library/redis:8.6.1-alpine
    container_name: redis
    command: redis-server --loglevel warning --protected-mode no
    restart: unless-stopped
    networks:
      - concord_net

  concord:
    image: docker.io/library/node:24.14.0-alpine
    container_name: concord
    working_dir: /app
    command: node bootstrap.js
    environment:
      - IS_CONTAINER=true
      - API_PORT=8080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=concord
      - POSTGRES_USER=${POSTGRES_USER:-concord}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-concord_secret_password_change_in_production}
    expose:
      - "8080"  # Internal port for Caddy proxy (not exposed to host)
    depends_on:
      - postgres
      - redis
    networks:
      - concord_net
    volumes:
      # Bind mounts (you edit on host + Zero Install with container install support)
      - ./.pnp.cjs:/app/.pnp.cjs:Z
      - ./.pnp.loader.mjs:/app/.pnp.loader.mjs:Z
      - ./.yarn:/app/.yarn:Z
      - ./.yarnrc.yml:/app/.yarnrc.yml:ro,Z
      - ./yarn.lock:/app/yarn.lock:Z
      - ./data:/app/data:Z
      - ./src:/app/src:Z
      - ./public:/app/public:Z
      - ./bootstrap.js:/app/bootstrap.js:Z
      - ./nodemon.json:/app/nodemon.json:Z
      - ./package.json:/app/package.json:Z
      - ./podman-compose.yaml:/app/podman-compose.yaml:Z
      - ./tsconfig.json:/app/tsconfig.json:Z
    restart: unless-stopped

  caddy:
    image: docker.io/library/caddy:2.11.2-alpine
    container_name: caddy
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    depends_on:
      - concord 
    networks:
      concord_net:
        ipv4_address: 10.7.7.7
    
volumes:
  postgres-data: {}
  caddy-data: {}
  caddy-config: {}

networks:
  concord_net:
    ipam:
      config:
        - subnet: 10.7.7.0/24

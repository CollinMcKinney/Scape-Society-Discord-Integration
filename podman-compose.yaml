services:
  redis:
    image: docker.io/library/redis:8.6.1-alpine

    container_name: redis
    command: redis-server --port ${REDIS_PORT} --loglevel warning --protected-mode no
    ports:
      - 127.0.0.1:${REDIS_PORT}:${REDIS_PORT}
    restart: unless-stopped

  concord:
    image: docker.io/library/node:24.14.0-alpine
    container_name: concord
    working_dir: /app
    command: node bootstrap.js
    environment:
      - CONTAINER=true
    depends_on:
      - redis
    env_file:
      - .env
    ports:
      - ${API_PORT}:${API_PORT}
    volumes:
      # PnP: No node_modules mount needed
      - dist:/app/dist
      # Shared for live nodemon rebuilds
      - ./.yarn:/app/.yarn:Z
      - ./.yarnrc.yml:/app/.yarnrc.yml:Z
      - ./.env:/app/.env:Z
      - ./nodemon.json:/app/nodemon.json:Z
      - ./package.json:/app/package.json:Z
      - ./bootstrap.js:/app/bootstrap.js:Z
      - ./tsconfig.json:/app/tsconfig.json:Z
      - ./src:/app/src:Z
      - ./data:/app/data:Z
    restart: unless-stopped

  caddy:
    image: docker.io/library/caddy:2.11.2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - concord 
    
volumes:
  dist: {}
  caddy_data: {}
  caddy_config: {}

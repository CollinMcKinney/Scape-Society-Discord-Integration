<!-- Edit Command Role Modal -->
<div class="modal-overlay" id="editCommandRoleModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">⚙️ Edit Command Permission</h3>
      <button class="modal-close" onclick="closeEditCommandRoleModal()" title="Close">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editCommandRoleCommand">
      <div class="field">
        <label for="editCommandRoleSelect">Minimum Role Required</label>
        <select id="editCommandRoleSelect">
          <option value="null">OPEN (No role required)</option>
          <option value="0">BLOCKED</option>
          <option value="1">GUEST</option>
          <option value="2">MEMBER</option>
          <option value="3">MODERATOR</option>
          <option value="4">ADMIN</option>
          <option value="5">OWNER</option>
          <option value="6">ROOT</option>
        </select>
      </div>
      <div class="field-help">This sets the minimum role required to execute this command through the admin panel.</div>
    </div>
    <div class="modal-footer">
      <button type="button" class="secondary-button" onclick="closeEditCommandRoleModal()" title="Close without saving">Cancel</button>
      <button type="button" class="primary-button" onclick="saveCommandRoleChange()" title="Save the new role requirement">Save Role</button>
    </div>
  </div>
</div>

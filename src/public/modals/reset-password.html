<!-- Reset Password Modal (ROOT only) -->
<div class="modal-overlay" id="resetPasswordModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">🔑 Reset Password</h3>
      <button class="modal-close" onclick="closeResetPasswordModal()" title="Close">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="resetPasswordUserId">
      <div class="field">
        <label>User</label>
        <div id="resetPasswordUsername" style="color: var(--text); font-size: 0.95rem;"></div>
      </div>
      <div class="field">
        <label for="resetPasswordNew">New Password</label>
        <input type="password" id="resetPasswordNew" placeholder="Enter new password" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(7, 15, 11, 0.86); color: var(--text); font: inherit; font-size: 0.9rem;">
      </div>
      <div class="field">
        <label for="resetPasswordConfirm">Confirm New Password</label>
        <input type="password" id="resetPasswordConfirm" placeholder="Confirm new password" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(7, 15, 11, 0.86); color: var(--text); font: inherit; font-size: 0.9rem;">
      </div>
      <div class="field-help" style="color: var(--muted); font-size: 0.85rem; margin-top: 8px;">
        ⚠️ This will immediately change the user's password. They will need to use the new password to log in.
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="secondary-button" onclick="closeResetPasswordModal()" title="Close without saving">Cancel</button>
      <button type="button" class="primary-button" onclick="saveResetPassword()" title="Save new password">Reset Password</button>
    </div>
  </div>
</div>

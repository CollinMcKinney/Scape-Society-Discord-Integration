<!-- Change Password Modal -->
<div class="modal-overlay" id="changePasswordModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">🔑 Change Password</h3>
      <button class="modal-close" onclick="closeChangePasswordModal()" title="Close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label for="changePasswordUsername">Username</label>
        <input type="text" id="changePasswordUsername" placeholder="Enter your username" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(7, 15, 11, 0.86); color: var(--text); font: inherit; font-size: 0.9rem;">
      </div>
      <div class="field">
        <label for="changePasswordCurrent">Current Password</label>
        <input type="password" id="changePasswordCurrent" placeholder="Enter current password" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(7, 15, 11, 0.86); color: var(--text); font: inherit; font-size: 0.9rem;">
      </div>
      <div class="field">
        <label for="changePasswordNew">New Password</label>
        <input type="password" id="changePasswordNew" placeholder="Enter new password" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(7, 15, 11, 0.86); color: var(--text); font: inherit; font-size: 0.9rem;">
      </div>
      <div class="field">
        <label for="changePasswordConfirm">Confirm New Password</label>
        <input type="password" id="changePasswordConfirm" placeholder="Confirm new password" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(7, 15, 11, 0.86); color: var(--text); font: inherit; font-size: 0.9rem;">
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="secondary-button" onclick="closeChangePasswordModal()" title="Close without saving">Cancel</button>
      <button type="button" class="primary-button" onclick="savePasswordChange()" title="Save new password">Save Password</button>
    </div>
  </div>
</div>

<!-- Edit Env Var Modal -->
<div class="modal-overlay" id="editEnvVarModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">🔧 Edit Environment Variable</h3>
      <button class="modal-close" onclick="closeEditEnvVarModal()" title="Close">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editEnvVarKey">
      <div class="field">
        <label for="editEnvVarValue">Value</label>
        <input type="text" id="editEnvVarValue" placeholder="Enter new value" spellcheck="false" autocomplete="off">
        <div class="field-help">Changes take effect immediately. Some settings may require a server restart.</div>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="secondary-button" onclick="closeEditEnvVarModal()" title="Close without saving">Cancel</button>
      <button type="button" class="primary-button" onclick="saveEnvVar()" title="Save the new value">Save Changes</button>
    </div>
  </div>
</div>

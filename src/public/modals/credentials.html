<!-- Credentials Modal -->
<div class="modal-overlay" id="credentialsModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">🔑 Log In</h3>
      <button class="modal-close" onclick="closeCredentialsModal()" title="Close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label for="rootCredentials">Username or User ID</label>
        <input type="text" id="rootCredentials" placeholder="Enter your username or user ID" spellcheck="false" autocomplete="off">
        <div class="field-help">Enter your OSRS name, Discord name, forum name, or user ID. Or paste userId=sessionToken format</div>
      </div>
      <div class="field">
        <label for="rootPassword">Password or Session Token</label>
        <input type="password" id="rootPassword" placeholder="Enter your password or session token" spellcheck="false" autocomplete="off">
        <div class="field-help">Enter your password, hashed password, or existing session token (optional if using userId=sessionToken format)</div>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="secondary-button" onclick="clearCredentials()" title="Clear credentials">Clear</button>
      <button type="button" class="primary-button" onclick="closeCredentialsModal()" title="Save and close">Log In</button>
    </div>
  </div>
</div>

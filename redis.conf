# Redis configuration for Concord
# Minimal logging, localhost only

# Bind to localhost only (security)
bind 127.0.0.1

# Port
port 6379

# Logging - only warnings and errors
loglevel warning

# Disable protected mode warning (we're bound to localhost)
protected-mode no

# Memory - disable overcommit warning (container environment)
# Note: This doesn't suppress the warning, it's a kernel-level notice

# Disable RDB snapshots (optional - uncomment if you don't need persistence)
# save ""

# Max memory policy
maxmemory-policy noeviction
